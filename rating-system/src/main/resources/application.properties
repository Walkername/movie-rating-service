spring.profiles.active=dev

spring.application.name=rating-system

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/changelog.xml
spring.liquibase.contexts=dev
spring.liquibase.default-schema=public

# Kafka
spring.kafka.rating-created-topic.name=ratings-created
spring.kafka.rating-updated-topic.name=ratings-updated
spring.kafka.rating-deleted-topic.name=ratings-deleted

# Secret key
auth.jwt.secret=moviecluster

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=rating-system