events {}

http {

	map $http_upgrade $connection_upgrade {
		default upgrade;
		''      close;
	}

    upstream frontend {
        server frontend:80;
    }

    upstream user_service {
        server user-profile:8080;
    }

    upstream movie_service {
        server movie-catalog:8080;
    }

    upstream rating_service {
        server rating-system:8080;
    }

    upstream file_service {
        server file-service:8080;
    }

    upstream library_service {
        server user-library:8080;
    }

    upstream feed_service {
        server feed-service:8080;
    }

    upstream notification_service {
        server notification-service:8080;
    }

    upstream conversation_service {
        server conversation-service:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://frontend;
        }

        location /api/users/ {
            proxy_pass http://user_service/;
			proxy_set_header Host localhost;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/movies/ {
            proxy_pass http://movie_service/;
			proxy_set_header Host localhost;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ratings/ {
            proxy_pass http://rating_service/;
			proxy_set_header Host localhost;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/files/ {
            proxy_pass http://file_service/;
			proxy_set_header Host localhost;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/library/ {
            proxy_pass http://library_service/;
			proxy_set_header Host localhost;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/feed/ {
            proxy_pass http://feed_service/;
			proxy_set_header Host localhost;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service/;
			proxy_set_header Host localhost;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/conversations/ {
            proxy_pass http://conversation_service/;
			proxy_set_header Host localhost;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
        }
		
		location /ws/notifications {
			proxy_pass http://notification_service/ws;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;

			proxy_read_timeout 86400;
			proxy_send_timeout 86400;
			proxy_buffering off;
		}

		location /ws/conversations {
			proxy_pass http://conversation_service/ws;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;

			proxy_read_timeout 86400;
			proxy_send_timeout 86400;
			proxy_buffering off;
		}
    }
	
}